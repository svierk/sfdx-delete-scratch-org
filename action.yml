name: SFDX Delete Scratch Org
description: Composite action for deleting a Salesforce scratch org.

branding:
  icon: trash-2
  color: blue

inputs:
  target-org:
    description: Username or alias of the scratch org to delete. Not required if the default org is already set.
    required: false

runs:
  using: composite
  steps:
    - name: Delete Scratch Org
      shell: bash
      env:
        TARGET_ORG: ${{ inputs.target-org }}
      run: |
        set -euo pipefail

        args=(--no-prompt --json)

        if [[ -n "$TARGET_ORG" ]]; then
          args+=(--target-org "$TARGET_ORG")
        fi

        result=$(sf org delete scratch "${args[@]}")
        username=$(echo "$result" | jq -r '.result.username // empty')

        echo "✅ Successfully deleted scratch org: ${username:-default org}"

        # Append a self-contained section to the job summary. The leading and
        # trailing blank lines keep this block cleanly separated from sections
        # added by other steps/actions, regardless of their order or count.
        {
          echo ""
          echo "### 🗑️ Scratch org deleted"
          echo ""
          echo "- **Username:** \`${username:-default org}\`"
          echo ""
        } >> "$GITHUB_STEP_SUMMARY"
